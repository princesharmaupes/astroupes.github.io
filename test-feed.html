<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Test Feed</title>
  <meta name="description" content="Test page for validating RSS feed rendering.">
  <meta name="application-name" content="Astronomy & Astrophysics @ UPES">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Test Feed">
  <meta property="og:description" content="Test page for validating RSS feed rendering.">
  <meta property="og:url" content="https://astroupes.github.io/test-feed.html">
  <meta property="og:site_name" content="Astronomy & Astrophysics @ UPES">
  <link rel="canonical" href="https://astroupes.github.io/test-feed.html">
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Astronomy & Astrophysics @ UPES",
      "alternateName": "AStroUPES",
      "url": "https://astroupes.github.io/"
    }
  </script>
</head>
<body>
  <div id="feed-box">Loading...</div>

  <script>
    const url = "https://api.rss2json.com/v1/api.json?rss_url=https://www.nasa.gov/rss/dyn/breaking_news.rss";

    fetch(url)
      .then(res => res.json())
      .then(data => {
        const box = document.getElementById('feed-box');
        let html = "<h3>NASA News</h3><ul>";
        data.items.slice(0, 5).forEach(item => {
          html += `<li><a href="${item.link}" target="_blank">${item.title}</a></li>`;
        });
        html += "</ul>";
        box.innerHTML = html;
      })
      .catch(err => {
        document.getElementById('feed-box').innerText = "Error loading feed.";
        console.error(err);
      });
  </script>
<!-- Global Visitor Tracker --><img src="https://hits.sh/astroupes.github.io.svg" style="display: none;" />
</body>
</html>
