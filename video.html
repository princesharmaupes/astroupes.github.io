<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Live Space News Box</title>
  <meta name="description" content="Live space news box aggregating astronomy and space updates from major observatory and agency RSS feeds.">
  <meta name="application-name" content="Astronomy & Astrophysics @ UPES">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Live Space News Box">
  <meta property="og:description" content="Live space news box aggregating astronomy and space updates from major feeds.">
  <meta property="og:url" content="https://astroupes.github.io/video.html">
  <meta property="og:site_name" content="Astronomy & Astrophysics @ UPES">
  <link rel="canonical" href="https://astroupes.github.io/video.html">
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Astronomy & Astrophysics @ UPES",
      "alternateName": "AStroUPES",
      "url": "https://astroupes.github.io/"
    }
  </script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
    }

    #news-box {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 320px;
      max-height: 400px;
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      font-family: sans-serif;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 0 10px #000;
      z-index: 1000;
    }

    #news-box h3 {
      margin-top: 0;
      font-size: 18px;
      border-bottom: 1px solid #888;
      padding-bottom: 5px;
    }

    #news-list {
      list-style: none;
      padding-left: 0;
      font-size: 14px;
    }

    #news-list li {
      margin-bottom: 10px;
    }

    #news-list li a {
      color: #ffa;
      text-decoration: none;
    }

    #news-list li a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div id="news-box">
  <h3>🚀 Latest Space News</h3>
  <ul id="news-list">
    <li>Loading latest headlines...</li>
  </ul>
</div>

<script>
  const rssFeeds = [
    'https://www.nasa.gov/rss/dyn/breaking_news.rss',
    'https://webbtelescope.org/rss/news-releases',
    'https://hubblesite.org/rss/news',
    'https://fermi.gsfc.nasa.gov/rss/fermi_news.rss'
  ];

  const newsList = document.getElementById('news-list');
  newsList.innerHTML = ''; // Clear loading message

  rssFeeds.forEach(feedUrl => {
    fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feedUrl)}`)
      .then(response => response.json())
      .then(data => {
        if (data.status === 'ok') {
          data.items.slice(0, 3).forEach(item => {
            const li = document.createElement('li');
            li.innerHTML = `<a href="${item.link}" target="_blank">${item.title}</a>`;
            newsList.appendChild(li);
          });
        }
      })
      .catch(error => {
        console.error('Error fetching RSS feed:', error);
      });
  });
</script>

<!-- Global Visitor Tracker --><img src="https://hits.sh/astroupes.github.io.svg" style="display: none;" />
</body>
</html>
